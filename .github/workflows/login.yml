name: 塔吉多登录

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '发验证码或登录'
        required: true
        default: 'send-code'
      account_id:
        description: '登录时使用的账号标识'
        required: false
      account_name:
        description: '登录时显示的账号名称'
        required: false
      phone:
        description: '手机号'
        required: true
      captcha:
        description: '短信验证码'
        required: false
      device_id:
        description: '两步登录共用的 deviceId'
        required: false

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 发送验证码
        if: inputs.mode == 'send-code'
        env:
          TAYGEDO_LOGIN_MODE: send-code
          TAYGEDO_LOGIN_PHONE: ${{ inputs.phone }}
          TAYGEDO_LOGIN_DEVICE_ID: ${{ inputs.device_id }}
          TAYGEDO_LOGIN_DEVICE_ID_PATH: device-id.txt
        run: pnpm tsx src/login-action.ts

      - name: 登录并写回账号
        if: inputs.mode == 'login'
        env:
          TAYGEDO_LOGIN_MODE: login
          TAYGEDO_LOGIN_PHONE: ${{ inputs.phone }}
          TAYGEDO_LOGIN_CAPTCHA: ${{ inputs.captcha }}
          TAYGEDO_LOGIN_DEVICE_ID: ${{ inputs.device_id }}
          TAYGEDO_LOGIN_ACCOUNT_ID: ${{ inputs.account_id }}
          TAYGEDO_LOGIN_ACCOUNT_NAME: ${{ inputs.account_name }}
          TAYGEDO_ACCOUNTS: ${{ secrets.TAYGEDO_ACCOUNTS }}
          TAYGEDO_UPDATED_ACCOUNTS_PATH: updated-accounts.json
        run: pnpm tsx src/login-action.ts

      - name: 更新账号 Secret
        if: inputs.mode == 'login' && hashFiles('updated-accounts.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_UPDATE_TOKEN }}
        run: gh secret set TAYGEDO_ACCOUNTS < updated-accounts.json
